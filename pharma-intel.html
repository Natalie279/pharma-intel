<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen">

<!-- ==================== 顶部导航 ==================== -->

<!-- ==================== 主体内容 ==================== -->
<main class="max-w-7xl mx-auto px-4 py-6">

<!-- ==================== 设置侧滑面板 ==================== -->
<div id="settingsOverlay" class="fixed inset-0 bg-black/40 z-40 hidden"></div>
<aside id="settingsPanel" class="panel-slide fixed top-0 right-0 h-full w-full sm:w-[420px] bg-white dark:bg-slate-800 z-50 shadow-2xl translate-x-full overflow-y-auto">

<script>
// ==================== 配置区：集中管理公司列表 / 字段 / 批次等 ====================
const CONFIG = {
  COMPANIES: [
    { name: 'Roche', group: 'mnc' },
    { name: 'Pfizer', group: 'mnc' },
    { name: 'Novartis', group: 'mnc' },
    { name: 'AstraZeneca', group: 'mnc' },
    { name: 'MSD', group: 'mnc', aliases: ['Merck', 'Merck & Co', 'Merck & Co.', 'Merck Sharp & Dohme'] },
    { name: 'BMS', group: 'mnc', aliases: ['Bristol-Myers Squibb', 'Bristol Myers Squibb'] },
    { name: 'J&J', group: 'mnc', aliases: ['Johnson & Johnson', 'Johnson and Johnson'] },
    { name: 'Lilly', group: 'mnc', aliases: ['Eli Lilly', 'Eli Lilly and Company'] },
    { name: 'Sanofi', group: 'mnc' },
    { name: 'AbbVie', group: 'mnc' },
    { name: 'GSK', group: 'mnc', aliases: ['GlaxoSmithKline'] },
    { name: 'Takeda', group: 'mnc', aliases: ['Takeda Pharmaceutical'] },
    { name: '恒瑞医药', group: 'cn', aliases: ['Hengrui', 'Hengrui Medicine', 'Hengrui Pharmaceuticals', 'Jiangsu Hengrui Medicine', 'Jiangsu Hengrui Pharmaceutical'] },
    { name: '百济神州', group: 'cn', aliases: ['BeiGene', 'BeiGene Ltd'] },
    { name: '信达生物', group: 'cn', aliases: ['Innovent Biologics', 'Innovent'] },
    { name: '君实生物', group: 'cn', aliases: ['Junshi Biosciences', 'Junshi Bio', 'TopAlliance Biosciences'] },
    { name: '复星医药', group: 'cn', aliases: ['Fosun Pharma', 'Fosun Pharmaceutical', 'Shanghai Fosun Pharmaceutical'] },
    { name: '先声药业', group: 'cn', aliases: ['Simcere Pharmaceutical', 'Simcere'] },
    { name: '石药集团', group: 'cn', aliases: ['CSPC Pharmaceutical Group', 'CSPC Pharmaceutical', 'CSPC'] },
    { name: '中国生物制药', group: 'cn', aliases: ['Sino Biopharmaceutical', 'Sino Biopharm'] },
  ],
  BATCH_SIZE: 4,
  REQUEST_TIMEOUT_MS: 60000,
  TIMEOUT_RETRY_COUNT: 1,
  CACHE_KEY: 'pharma_intel_data',
  SETTINGS_KEY: 'pharma_intel_settings',
  THEME_KEY: 'pharma_intel_theme',
  CACHE_WARN_DAYS: 3,
  DEFAULT_BASE_URL: 'https://api.openai.com/v1',
  DEFAULT_MODEL: 'gpt-4o',
  // 常用厂商预设：仅自动填充 Base URL / 模型名，不含 API Key
  PROVIDER_PRESETS: [
    { label: 'OpenAI 官方', baseUrl: 'https://api.openai.com/v1', modelName: 'gpt-4o' },
    { label: 'DeepSeek', baseUrl: 'https://api.deepseek.com/v1', modelName: 'deepseek-chat' },
    { label: '通义千问（阿里云百炼兼容模式）', baseUrl: 'https://dashscope.aliyuncs.com/compatible-mode/v1', modelName: 'qwen-plus' },
    { label: '智谱 GLM', baseUrl: 'https://open.bigmodel.cn/api/paas/v4', modelName: 'glm-4' },
    { label: 'Moonshot Kimi', baseUrl: 'https://api.moonshot.cn/v1', modelName: 'moonshot-v1-8k' },
  ],
  FIELDS: ['company', 'display_name', 'market_cap', 'market_cap_trend', 'revenue', 'net_profit', 'top_products', 'key_pipeline', 'data_as_of', 'summary'],
};

// ==================== 全局状态 ====================
let settings = null;          // { baseUrl, apiKey, modelName, webSearchEnabled }
let cacheData = null;         // { updatedAt, companies: { [name]: record } }
let isFirstUse = false;
let isLoading = false;
let currentGroupFilter = 'all';
let currentSort = 'default';
let pendingCompanyKeys = new Set();
let errorMessages = [];

// ==================== 工具函数 ====================

// 转义文本，防止 LLM 返回内容中的特殊字符破坏页面结构
function escapeHtml(str) {
  if (str === null || str === undefined) return 'N/A';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function chunkArray(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
  return out;
}

// 归一化公司名（去空格/标点、转小写），用于容错匹配模型返回的公司名与我们请求的公司名
function normalizeCompanyName(name) {
  return String(name || '').toLowerCase().replace(/[^a-z0-9一-龥]/g, '');
}

// 判断模型返回的公司名是否指代某个目标公司（精确匹配 / 别名匹配 / 归一化匹配）
function matchesCompany(returnedName, company) {
  if (returnedName === company.name) return true;
  const normReturned = normalizeCompanyName(returnedName);
  if (normReturned === normalizeCompanyName(company.name)) return true;
  return (company.aliases || []).some(alias => normalizeCompanyName(alias) === normReturned);
}

// 数据基准日：取"今天（发起刷新的这天）的前一天"，作为要求模型对齐估算的参考日期
function getReferenceDate() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}

function b64EncodeUnicode(str) {
  return btoa(String.fromCharCode(...new TextEncoder().encode(str)));
}
function b64DecodeUnicode(str) {
  return new TextDecoder().decode(Uint8Array.from(atob(str), c => c.charCodeAt(0)));
}

function formatDateTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function daysSince(iso) {
  if (!iso) return Infinity;
  return (Date.now() - new Date(iso).getTime()) / 86400000;
}

// 近似解析市值字符串为可比较的数值（以"亿"为基准单位），仅用于排序，不代表精确汇率换算
function parseMarketCapNumeric(str) {
  if (!str || typeof str !== 'string') return -Infinity;
  const s = str.replace(/,/g, '');
  const match = s.match(/([\d.]+)\s*(万亿|千亿|百亿|亿|trillion|billion|million|万|[tbm])?/i);
  if (!match || !match[1]) return -Infinity;
  const num = parseFloat(match[1]);
  if (isNaN(num)) return -Infinity;
  const unit = (match[2] || '').toLowerCase();
  const unitMap = {
    '万亿': 10000, '千亿': 1000, '百亿': 100, '亿': 1,
    'trillion': 10000, 't': 10000,
    'billion': 10, 'b': 10,
    'million': 0.01, 'm': 0.01,
    '万': 0.0001,
  };
  const multiplier = unitMap[unit] !== undefined ? unitMap[unit] : 1;
  return num * multiplier;
}

function trendMeta(trend) {
  if (trend === 'up') return { symbol: '↑', cls: 'text-emerald-600 dark:text-emerald-400' };
  if (trend === 'down') return { symbol: '↓', cls: 'text-rose-600 dark:text-rose-400' };
  if (trend === 'flat') return { symbol: '→', cls: 'text-slate-400' };
  return { symbol: '—', cls: 'text-slate-400' };
}

// ==================== 本地存储读写 ====================

function loadSettings() {
  const raw = localStorage.getItem(CONFIG.SETTINGS_KEY);
  isFirstUse = raw === null;
  if (!raw) {
    return { baseUrl: CONFIG.DEFAULT_BASE_URL, apiKey: '', modelName: CONFIG.DEFAULT_MODEL, webSearchEnabled: false };
  }
  try {
    const parsed = JSON.parse(raw);
    return {
      baseUrl: parsed.baseUrl || CONFIG.DEFAULT_BASE_URL,
      apiKey: parsed.apiKey || '',
      modelName: parsed.modelName || CONFIG.DEFAULT_MODEL,
      webSearchEnabled: !!parsed.webSearchEnabled,
    };
  } catch (e) {
    return { baseUrl: CONFIG.DEFAULT_BASE_URL, apiKey: '', modelName: CONFIG.DEFAULT_MODEL, webSearchEnabled: false };
  }
}

function saveSettingsToStorage(s) {
  localStorage.setItem(CONFIG.SETTINGS_KEY, JSON.stringify(s));
}

function loadCache() {
  const raw = localStorage.getItem(CONFIG.CACHE_KEY);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch (e) { return null; }
}

function saveCacheToStorage(data) {
  localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify(data));
}

// ==================== LLM 调用 ====================

function buildMessages(batchCompanies) {
  const refDate = getReferenceDate();
  const sys = `你是一位资深医药行业分析师。请根据你掌握的最新公开信息，对以下药企进行财务与市值摘要，每家公司严格按照指定 JSON schema 输出，数据缺失字段填 "N/A"，不要编造数字，如不确定请注明"约"或给出范围。请将 ${refDate}（即今天的前一天）作为数据基准日：市值等会逐日变化的数据请尽量给出截至该日期（或最近一个交易日）的估算；营收/净利润等按财报周期披露的数据仍以你实际掌握的最新一期财报为准，不要为了凑日期而编造尚未披露的数字。`;
  const schema = '{"company":"必须与我提供的原始公司名逐字完全一致（无论中文还是英文，禁止翻译、替换为英文名/股票代码/全称或别名）","display_name":"显示名称（中英双语）","market_cap":"最新市值（如 2,800亿美元）","market_cap_trend":"up|down|flat","revenue":"最近一期年收入","net_profit":"净利润或EBITDA","top_products":["产品A 收入X","产品B 收入Y"],"key_pipeline":["管线A (Ph3)","管线B (Ph2)"],"data_as_of":"该数据实际对应的截至日期/报告期（如晚于或早于基准日，请如实填写真实日期，不要强行对齐为基准日）","summary":"50字内的财务亮点或风险提示"}';
  const names = batchCompanies.map(c => c.name).join('、');
  const user = `请对以下 ${batchCompanies.length} 家公司逐一输出财务摘要，一家都不能少、也不能合并：${names}\n\n必须输出恰好 ${batchCompanies.length} 条记录，company 字段必须逐字复制我给出的公司名，中文名就原样输出中文、英文名就原样输出英文，不要翻译或替换成别的名称（例如给的是"J&J"就不要写成"Johnson & Johnson"，给的是"百济神州"就不要写成"BeiGene"）。即使某公司信息完全无法确定，也要输出该公司的记录，所有字段填 "N/A"，不允许省略整家公司。\n\n请以严格的 JSON 对象格式返回，格式为 {"companies": [每家公司一个对象，字段如下]}，字段 schema：${schema}\n不要有任何额外文字、不要使用 markdown 代码块。`;
  return [{ role: 'system', content: sys }, { role: 'user', content: user }];
}

function fetchWithTimeout(url, options, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  return fetch(url, { ...options, signal: controller.signal }).finally(() => clearTimeout(timer));
}

// 从模型返回的文本中尽力提取 JSON（兼容未走 response_format 严格模式的情况）
function extractJson(content) {
  try { return JSON.parse(content); } catch (e) {}
  const fenceMatch = content.match(/```(?:json)?\s*([\s\S]*?)```/i);
  if (fenceMatch) { try { return JSON.parse(fenceMatch[1]); } catch (e) {} }
  const objMatch = content.match(/\{[\s\S]*\}/);
  if (objMatch) { try { return JSON.parse(objMatch[0]); } catch (e) {} }
  const arrMatch = content.match(/\[[\s\S]*\]/);
  if (arrMatch) { try { return JSON.parse(arrMatch[0]); } catch (e) {} }
  throw new Error('PARSE_FAILED');
}

function normalizeCompanyRecord(raw) {
  const record = {};
  for (const field of CONFIG.FIELDS) {
    if (field === 'top_products' || field === 'key_pipeline') {
      record[field] = Array.isArray(raw[field]) ? raw[field] : [];
    } else {
      record[field] = (raw[field] === undefined || raw[field] === null || raw[field] === '') ? 'N/A' : raw[field];
    }
  }
  return record;
}

function placeholderRecord(name, reason) {
  return {
    company: name, display_name: name, market_cap: '数据暂缺', market_cap_trend: 'flat',
    revenue: '数据暂缺', net_profit: '数据暂缺', top_products: [], key_pipeline: [],
    data_as_of: 'N/A', summary: reason || '获取失败', _error: true,
  };
}

// 单次向 {baseURL}/chat/completions 发起请求；combo 控制是否携带 response_format / web_search_options
async function tryCallLLM(batch, s, combo) {
  const body = {
    model: s.modelName,
    messages: buildMessages(batch),
    temperature: 0.3,
  };
  if (combo.json) body.response_format = { type: 'json_object' };
  if (combo.web) body.web_search_options = {};

  let res;
  try {
    res = await fetchWithTimeout(`${s.baseUrl.replace(/\/$/, '')}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${s.apiKey}` },
      body: JSON.stringify(body),
    }, CONFIG.REQUEST_TIMEOUT_MS);
  } catch (err) {
    const e = new Error(err.name === 'AbortError'
      ? `请求超时（${CONFIG.REQUEST_TIMEOUT_MS / 1000}秒），可能是单批公司数量较多、模型响应较慢（尤其开启了联网搜索时），请稍后重试；若持续超时可尝试关闭"联网搜索"或更换响应更快的模型`
      : '网络请求失败：该 API 可能不支持浏览器直接跨域调用（CORS），请检查 Base URL 或更换支持 CORS 的代理地址');
    e.type = err.name === 'AbortError' ? 'timeout' : 'network';
    throw e;
  }

  if (!res.ok) {
    let bodyText = '';
    try { bodyText = await res.text(); } catch (e) {}
    if (res.status === 401) {
      const e = new Error('401 未授权：请检查 API Key 是否正确'); e.type = 'auth'; throw e;
    }
    if (res.status === 429) {
      const e = new Error('429 请求超限：已达到该 API 的速率/配额限制，请稍后重试'); e.type = 'rate_limit'; throw e;
    }
    if (res.status === 400) {
      const e = new Error(`400 请求参数错误：${bodyText.slice(0, 200)}`); e.type = 'bad_request'; throw e;
    }
    const e = new Error(`请求失败（HTTP ${res.status}）：${bodyText.slice(0, 200)}`); e.type = 'http_error'; throw e;
  }

  const json = await res.json();
  const content = json.choices?.[0]?.message?.content ?? '';
  let parsed;
  try {
    parsed = extractJson(content);
  } catch (e) {
    const err = new Error('模型返回内容不是有效 JSON'); err.type = 'parse_error'; err.raw = content; throw err;
  }
  const list = Array.isArray(parsed) ? parsed : (Array.isArray(parsed.companies) ? parsed.companies : null);
  if (!list) {
    const err = new Error('JSON 结构不符合预期（缺少 companies 数组）'); err.type = 'parse_error'; err.raw = content; throw err;
  }
  return list.map(normalizeCompanyRecord);
}

// 依次尝试不同参数组合（是否带 response_format / web_search_options），遇到 400 类错误才降级重试，其余错误直接抛出
async function callLLMBatchOnce(batch, s) {
  const combos = s.webSearchEnabled
    ? [{ json: true, web: true }, { json: false, web: true }, { json: true, web: false }, { json: false, web: false }]
    : [{ json: true, web: false }, { json: false, web: false }];
  let lastError = null;
  for (const combo of combos) {
    try {
      return await tryCallLLM(batch, s, combo);
    } catch (err) {
      lastError = err;
      if (err.type !== 'bad_request') throw err;
    }
  }
  throw lastError;
}

// 超时通常是瞬时性的（模型该批次响应较慢），自动重试若干次再放弃
async function callLLMBatch(batch, s) {
  let lastError = null;
  for (let attempt = 0; attempt <= CONFIG.TIMEOUT_RETRY_COUNT; attempt++) {
    try {
      return await callLLMBatchOnce(batch, s);
    } catch (err) {
      lastError = err;
      if (err.type !== 'timeout' || attempt === CONFIG.TIMEOUT_RETRY_COUNT) throw err;
    }
  }
  throw lastError;
}

// ==================== 主流程：刷新数据 ====================

async function refreshAllData() {
  if (isLoading) return;
  isLoading = true;
  errorMessages = [];
  renderErrorBanner();
  updateRefreshButtonState(true);

  pendingCompanyKeys = new Set(CONFIG.COMPANIES.map(c => c.name));
  if (!cacheData) cacheData = { updatedAt: null, companies: {} };
  cacheData.referenceDate = getReferenceDate();
  renderCards();

  const batches = chunkArray(CONFIG.COMPANIES, CONFIG.BATCH_SIZE);
  for (const batch of batches) {
    try {
      const results = await callLLMBatch(batch, settings);
      const unresolved = new Set(batch.map(c => c.name));
      for (const r of results) {
        // 优先精确匹配请求的公司名；模型改写/扩写了名称（如 J&J -> Johnson & Johnson）时用别名/归一化匹配兜底
        const matched = batch.find(c => unresolved.has(c.name) && matchesCompany(r.company, c));
        if (matched) {
          cacheData.companies[matched.name] = r;
          unresolved.delete(matched.name);
          pendingCompanyKeys.delete(matched.name);
        }
      }
      for (const name of unresolved) {
        cacheData.companies[name] = placeholderRecord(name, '模型未返回该公司数据');
        pendingCompanyKeys.delete(name);
      }
    } catch (err) {
      const names = batch.map(c => c.name).join('、');
      errorMessages.push(`[${names}] ${err.message}${err.raw ? '（原始返回：' + err.raw.slice(0, 150) + '…）' : ''}`);
      for (const c of batch) {
        cacheData.companies[c.name] = placeholderRecord(c.name, err.message);
        pendingCompanyKeys.delete(c.name);
      }
    }
    renderCards();
    renderErrorBanner();
  }

  cacheData.updatedAt = new Date().toISOString();
  saveCacheToStorage(cacheData);
  isLoading = false;
  updateRefreshButtonState(false);
  renderToolbar();
}

function updateRefreshButtonState(loading) {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = loading;
  btn.textContent = loading ? '⏳ 加载中…' : '🔄 刷新数据';
}

// ==================== 渲染 ====================

function renderErrorBanner() {
  const el = document.getElementById('errorBanner');
  if (!errorMessages.length) { el.innerHTML = ''; return; }
  el.innerHTML = errorMessages.map(msg => `
    <div class="px-4 py-3 rounded-lg bg-rose-50 dark:bg-rose-900/30 border border-rose-200 dark:border-rose-700 text-rose-700 dark:text-rose-200 text-sm">
      ❌ ${escapeHtml(msg)}
    </div>
  `).join('');
}

function renderToolbar() {
  const el = document.getElementById('lastUpdatedText');
  const refEl = document.getElementById('referenceDateText');
  if (!cacheData || !cacheData.updatedAt) {
    el.textContent = '尚未获取过数据';
    refEl.textContent = '';
    return;
  }
  const stale = daysSince(cacheData.updatedAt) > CONFIG.CACHE_WARN_DAYS;
  el.innerHTML = `上次更新时间：${formatDateTime(cacheData.updatedAt)}` +
    (stale ? ' <span class="ml-1 px-2 py-0.5 rounded bg-orange-100 dark:bg-orange-900/40 text-orange-700 dark:text-orange-300 text-xs">数据已超过 3 天，建议刷新</span>' : '');
  refEl.textContent = cacheData.referenceDate ? `（要求模型以 ${cacheData.referenceDate} 为数据基准日）` : '';
}

function getFilteredSortedCompanies() {
  let list = CONFIG.COMPANIES.filter(c => currentGroupFilter === 'all' || c.group === currentGroupFilter);
  if (currentSort !== 'default') {
    list = [...list].sort((a, b) => {
      const va = parseMarketCapNumeric(cacheData?.companies?.[a.name]?.market_cap);
      const vb = parseMarketCapNumeric(cacheData?.companies?.[b.name]?.market_cap);
      return currentSort === 'desc' ? vb - va : va - vb;
    });
  }
  return list;
}

function skeletonCardHtml() {
  return `
    <div class="rounded-xl border border-slate-200 dark:border-slate-700 p-4 space-y-3 bg-white dark:bg-slate-800">
      <div class="skeleton h-5 w-2/3 rounded"></div>
      <div class="skeleton h-4 w-1/3 rounded"></div>
      <div class="skeleton h-4 w-full rounded"></div>
      <div class="skeleton h-4 w-full rounded"></div>
      <div class="skeleton h-16 w-full rounded"></div>
    </div>`;
}

function cardHtml(company, data) {
  const trend = trendMeta(data.market_cap_trend);
  const errorRing = data._error ? 'border-rose-300 dark:border-rose-700' : 'border-slate-200 dark:border-slate-700';
  const products = data.top_products.length
    ? data.top_products.map(p => `<li>${escapeHtml(p)}</li>`).join('')
    : '<li class="text-slate-400">N/A</li>';
  const pipeline = data.key_pipeline.length
    ? data.key_pipeline.map(p => `<li>${escapeHtml(p)}</li>`).join('')
    : '<li class="text-slate-400">N/A</li>';

  return `
    <div class="rounded-xl border ${errorRing} p-4 space-y-2 bg-white dark:bg-slate-800 flex flex-col">
      <div class="flex items-start justify-between gap-2">
        <h3 class="font-bold text-base leading-tight">${escapeHtml(data.display_name)}</h3>
        <span class="text-xs px-2 py-0.5 rounded ${company.group === 'mnc' ? 'bg-indigo-50 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-300' : 'bg-emerald-50 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-300'}">${company.group === 'mnc' ? '国际MNC' : '国内'}</span>
      </div>
      <div class="text-xl font-extrabold flex items-center gap-1">
        ${escapeHtml(data.market_cap)} <span class="${trend.cls} text-lg">${trend.symbol}</span>
      </div>
      <div class="text-sm text-slate-600 dark:text-slate-300">营收：${escapeHtml(data.revenue)}</div>
      <div class="text-sm text-slate-600 dark:text-slate-300">净利润/EBITDA：${escapeHtml(data.net_profit)}</div>
      <div class="text-sm">
        <div class="font-medium text-slate-500 dark:text-slate-400 mb-0.5">Top 产品</div>
        <ul class="list-disc list-inside text-slate-600 dark:text-slate-300 space-y-0.5">${products}</ul>
      </div>
      <div class="text-sm">
        <div class="font-medium text-slate-500 dark:text-slate-400 mb-0.5">关键管线</div>
        <ul class="list-disc list-inside text-slate-600 dark:text-slate-300 space-y-0.5">${pipeline}</ul>
      </div>
      <div class="text-sm text-slate-600 dark:text-slate-300 flex-1">${escapeHtml(data.summary)}</div>
      <div class="text-xs text-slate-400 pt-2 border-t border-slate-100 dark:border-slate-700">数据截至：${escapeHtml(data.data_as_of)}</div>
    </div>`;
}

function emptyStateHtml() {
  return `<div class="col-span-full text-center py-16 text-slate-400">
    <div class="text-4xl mb-2">📊</div>
    <div>点击右上方「刷新数据」获取最新的药企市值与财务信息</div>
  </div>`;
}

function renderCards() {
  const container = document.getElementById('cardGrid');
  const list = getFilteredSortedCompanies();

  if (!cacheData && !isLoading) {
    container.innerHTML = emptyStateHtml();
    return;
  }

  container.innerHTML = list.map(c => {
    const data = cacheData?.companies?.[c.name];
    if (!data) return skeletonCardHtml();
    return cardHtml(c, data);
  }).join('');
}

// ==================== 设置面板交互 ====================

function openSettingsPanel() {
  document.getElementById('baseUrlInput').value = settings.baseUrl;
  document.getElementById('apiKeyInput').value = settings.apiKey;
  document.getElementById('modelNameInput').value = settings.modelName;
  document.getElementById('webSearchCheckbox').checked = settings.webSearchEnabled;
  document.getElementById('firstUseTip').classList.toggle('hidden', !isFirstUse);
  document.getElementById('settingsOverlay').classList.remove('hidden');
  document.getElementById('settingsPanel').classList.remove('translate-x-full');
}

function closeSettingsPanel() {
  document.getElementById('settingsOverlay').classList.add('hidden');
  document.getElementById('settingsPanel').classList.add('translate-x-full');
}

// 用 CONFIG.PROVIDER_PRESETS 填充厂商预设下拉菜单
function populateProviderPresets() {
  const select = document.getElementById('providerPresetSelect');
  CONFIG.PROVIDER_PRESETS.forEach((preset, i) => {
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = preset.label;
    select.appendChild(opt);
  });
}

// 选择厂商预设后自动填充 Base URL / 模型名（不动 API Key）
function handleProviderPresetChange(e) {
  if (e.target.value === '') return;
  const preset = CONFIG.PROVIDER_PRESETS[Number(e.target.value)];
  if (!preset) return;
  document.getElementById('baseUrlInput').value = preset.baseUrl;
  document.getElementById('modelNameInput').value = preset.modelName;
}

function handleSaveSettings() {
  settings = {
    baseUrl: document.getElementById('baseUrlInput').value.trim() || CONFIG.DEFAULT_BASE_URL,
    apiKey: document.getElementById('apiKeyInput').value.trim(),
    modelName: document.getElementById('modelNameInput').value.trim() || CONFIG.DEFAULT_MODEL,
    webSearchEnabled: document.getElementById('webSearchCheckbox').checked,
  };
  saveSettingsToStorage(settings);
  isFirstUse = false;
  document.getElementById('firstUseTip').classList.add('hidden');
  const status = document.getElementById('saveSettingsStatus');
  status.textContent = '✅ 已保存';
  status.className = 'text-sm h-5 text-emerald-600 dark:text-emerald-400';
  setTimeout(() => { status.textContent = ''; }, 2000);
}

function handleExportConfig() {
  const payload = { baseURL: settings.baseUrl, modelName: settings.modelName, exportedAt: new Date().toISOString() };
  const encoded = b64EncodeUnicode(JSON.stringify(payload));
  document.getElementById('exportConfigOutput').value = encoded;
  document.getElementById('exportModalOverlay').classList.remove('hidden');
  document.getElementById('exportModalOverlay').classList.add('flex');
}

function closeExportModal() {
  document.getElementById('exportModalOverlay').classList.add('hidden');
  document.getElementById('exportModalOverlay').classList.remove('flex');
}

async function copyExportConfig(btn) {
  const text = document.getElementById('exportConfigOutput').value;
  try {
    await navigator.clipboard.writeText(text);
  } catch (e) {
    const ta = document.getElementById('exportConfigOutput');
    ta.select();
    document.execCommand('copy');
  }
  const original = btn.textContent;
  btn.textContent = '✅ 已复制';
  setTimeout(() => { btn.textContent = original; }, 2000);
}

function handleImportConfig() {
  const input = document.getElementById('importConfigInput').value.trim();
  const status = document.getElementById('importConfigStatus');
  try {
    const decoded = b64DecodeUnicode(input);
    const obj = JSON.parse(decoded);
    if (!obj.baseURL) throw new Error('missing baseURL');
    document.getElementById('baseUrlInput').value = obj.baseURL;
    if (obj.modelName) document.getElementById('modelNameInput').value = obj.modelName;
    const apiKeyInput = document.getElementById('apiKeyInput');
    apiKeyInput.value = '';
    apiKeyInput.classList.add('ring-2', 'ring-amber-400');
    apiKeyInput.focus();
    setTimeout(() => apiKeyInput.classList.remove('ring-2', 'ring-amber-400'), 3000);
    status.textContent = '配置已导入，请填写你的 API Key 后保存';
    status.className = 'text-sm h-5 mt-1 text-emerald-600 dark:text-emerald-400';
  } catch (e) {
    status.textContent = '配置格式无效，请重新复制';
    status.className = 'text-sm h-5 mt-1 text-rose-600 dark:text-rose-400';
  }
}

// ==================== 主题 ====================

function initTheme() {
  const saved = localStorage.getItem(CONFIG.THEME_KEY);
  const dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.classList.toggle('dark', dark);
}

function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem(CONFIG.THEME_KEY, isDark ? 'dark' : 'light');
}

// ==================== 初始化与事件绑定 ====================

function init() {
  initTheme();
  settings = loadSettings();
  cacheData = loadCache();
  populateProviderPresets();

  renderToolbar();
  renderCards();

  document.getElementById('providerPresetSelect').addEventListener('change', handleProviderPresetChange);
  document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);
  document.getElementById('openSettingsBtn').addEventListener('click', openSettingsPanel);
  document.getElementById('closeSettingsBtn').addEventListener('click', closeSettingsPanel);
  document.getElementById('settingsOverlay').addEventListener('click', closeSettingsPanel);
  document.getElementById('saveSettingsBtn').addEventListener('click', handleSaveSettings);

  document.getElementById('exportConfigBtn').addEventListener('click', handleExportConfig);
  document.getElementById('closeExportModalBtn').addEventListener('click', closeExportModal);
  document.getElementById('exportModalOverlay').addEventListener('click', (e) => { if (e.target.id === 'exportModalOverlay') closeExportModal(); });
  document.getElementById('copyExportBtn').addEventListener('click', (e) => copyExportConfig(e.target));
  document.getElementById('importConfigBtn').addEventListener('click', handleImportConfig);

  document.getElementById('refreshBtn').addEventListener('click', refreshAllData);

  document.querySelectorAll('.group-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentGroupFilter = btn.dataset.group;
      document.querySelectorAll('.group-filter-btn').forEach(b => b.classList.remove('bg-indigo-600', 'text-white'));
      btn.classList.add('bg-indigo-600', 'text-white');
      renderCards();
    });
  });

  document.getElementById('sortSelect').addEventListener('change', (e) => {
    currentSort = e.target.value;
    renderCards();
  });
}

document.addEventListener('DOMContentLoaded', init);
